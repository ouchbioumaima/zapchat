name: Deploy to HF Spaces
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to HF
        run: |
          git remote add huggingface https://mimaouchbi:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/mimaouchbi/zap-chat
          git push huggingface main --force
